server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/store?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
    livereload:
      enabled: true

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 10000ms

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: org.sxk.store.entity

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    org.sxk.store: DEBUG
    org.mybatis: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data.redis: DEBUG